<div class="breath-stage">
  <div
    class="breath-orb"
    [class.breathe-in]="breathe === 'in'"
    [class.breathe-out]="breathe === 'out'"
    aria-hidden="true"
  ></div>

  <div class="overlay-content">
    <div class="pause" *ngIf="!ready">
      <h1
        class="animated"
        [class.fadeIn]="begin"
        [class.hidden]="!begin"
        [class.fadeOut]="paused"
      >Pause.</h1>
      <h1
        class="animated"
        [class.fadeIn]="paused && !ready"
        [class.hidden]="!paused"
        [class.fadeOut]="ready"
      >Take a breath.</h1>
    </div>

    <div *ngIf="ready" class="questions">
      <question
        [q]="'Where are you'"
        [answer]="'Here'"
        (answered)="firstAnswered = true"
      ></question>
      <question
        *ngIf="firstAnswered"
        [q]="'What time is it?'"
        [answer]="'Now'"
        (answered)="secondAnswered = true"
      ></question>
      <question
        *ngIf="secondAnswered"
        [q]="'What are you?'"
        [answer]="'This moment'"
        (answered)="next()"
      ></question>
    </div>
  </div>
</div>
