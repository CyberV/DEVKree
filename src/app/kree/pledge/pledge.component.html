<div class="row">
  <div class="col-xs-12">
    <your-name (answered)="hasName = true"></your-name>
  </div>
</div>

<div class="center pledge-body" *ngIf="hasName">
  <div class="content">
    <div class="row">
      <div class="col-xs-12">
        <typeaway
          [text]="'At this moment, I pledge'"
          (finished)="drop = true"
        ></typeaway>
      </div>
    </div>

    <div class="row drop-row">
      <div class="col-xs-4">
        <drop-bomb
          *ngIf="drop"
          [text]="'TO DO'"
          (finished)="good = true"
        ></drop-bomb>
      </div>
      <div class="col-xs-4 good-col">
        <span *ngIf="good" class="good-text" [class.struck]="great">
          <typeaway
            [text]="'good'"
            (finished)="onGoodDone()"
          ></typeaway>
        </span>
        <br />
        <typeaway
          *ngIf="great"
          [text]="'great'"
          (finished)="because = true"
        ></typeaway>
      </div>
    </div>

    <div class="row">
      <div class="col-xs-12">
        <typeaway
          *ngIf="because"
          [text]="'BECAUSE'"
          (finished)="ican = true"
        ></typeaway>
        <br />
        <span *ngIf="ican" class="ican-text">
          <typeaway
            [text]="'I can.'"
            (finished)="iwant = true"
          ></typeaway>
        </span>
        <br />
        <typeaway
          *ngIf="iwant"
          [text]="'I want to.'"
          (finished)="ineed = true"
        ></typeaway>
        <br />
        <typeaway
          *ngIf="ineed"
          [text]="'I need to.'"
          (finished)="onFinalLine()"
        ></typeaway>
      </div>
    </div>
  </div>
</div>
